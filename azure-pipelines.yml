
trigger:
- main

stages:
- stage: Build
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: 'terraform init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendAzureRmUseEntraIdForAuthentication: false
        backendServiceArm: 'Azure subscription 1(defaf26e-a23b-4a38-b4d4-dc9c52fb4b6d)'
        backendAzureRmResourceGroupName: 'terrabackup'
        backendAzureRmStorageAccountName: 'backupterra'
        backendAzureRmContainerName: 'tf-state'
        backendAzureRmKey: 'terraform.tfstate'
    
    - task: TerraformTask@5
      displayName: 'Terraform Validate'
      inputs:
        provider: 'azurerm'
        command: 'validate'

    - task: TerraformTask@5
      displayName: 'Terraform Format'
      inputs:
        provider: 'azurerm'
        command: 'custom'
        outputTo: 'console'
        customCommand: 'fmt'
        environmentServiceNameAzureRM: 'Azure subscription 1(defaf26e-a23b-4a38-b4d4-dc9c52fb4b6d)'

    - task: TerraformTask@5
      displayName: 'Terraform Plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'Azure subscription 1(defaf26e-a23b-4a38-b4d4-dc9c52fb4b6d)'
    
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: 'Azure subscription 1(defaf26e-a23b-4a38-b4d4-dc9c52fb4b6d)'
    

    - task: AzurePowerShell@5
      displayName: 'Script_Resources'
      inputs:
        azureSubscription: 'Azure subscription 1(defaf26e-a23b-4a38-b4d4-dc9c52fb4b6d)'
        ScriptType: 'InlineScript'
        Inline: |
          param(
                        [string]$SubscriptionId,
                        [string]$ResourceGroupName
                    )
                    
                    Write-Host "Setting Azure subscription..."
                              
                    Write-Host "Fetching resource groups: $ResourceGroupName"
                    
                    $resources = Get-AzResource -ResourceGroupName $ResourceGroupName
                    
                    if ($resources.Count -eq 0) {
                        Write-Host "No resources found in the resource group."
                    }
                    else {
                        $resources | Select-Object Name, ResourceType, Location |
                            Format-Table -AutoSize
                    }
                    
                    # Export resource list if required
                    $resources | Select-Object Name, ResourceType, Location |
                        Export-Csv -Path "./resources.csv" -NoTypeInformation
                    
                    Write-Host "Resource details exported to resources.csv"
                  azurePowerShellVersion: 'LatestVersion'
        azurePowerShellVersion: 'LatestVersion'

    - task: ArchiveFiles@2
      displayName: 'Archive File'
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
        replaceExistingArchive: true
    

        
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Build'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'terraform-files'
        publishLocation: 'Container'


